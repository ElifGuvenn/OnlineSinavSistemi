<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamFlow - Kayıt Ol</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-card">
        <!-- Logo Alanı -->
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Sisteme Kayıt Ol</h1>
            <p>Bilgilerinizi girerek hesabınızı oluşturun</p>
        </div>

        <!-- Flash Mesajları -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Form Alanı -->
        <form action="/register" method="post">
            <div class="input-group">
                <label>E-posta adresi</label>
                <input type="email" name="email" placeholder="ornek@uni.edu.tr" required>
            </div>
            
            <div class="input-group">
                <label>Şifre</label>
                <input type="password" name="password" placeholder="**********" required>
            </div>

            <div class="input-group">
                <label>Üyelik Tipi</label>
                <select name="role" class="form-select">
                    <option value="student">Öğrenci</option>
                    <option value="teacher">Öğretmen</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">Kayıt Ol</button>
        </form>

        <div class="divider">
            <span>zaten hesabın var mı?</span>
        </div>

        <a href="{{ url_for('index') }}" class="btn-secondary">Giriş Ekranına Dön</a>
    </div>
</body>
</html>
