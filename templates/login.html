<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Online Sınav Sistemi - Giriş</title>
    <!-- Static klasöründeki CSS dosyamızı çağırıyoruz -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Online Sınav Sistemi</h2>
        <form action="/" method="post">
            <div class="form-group">
                <label>E-posta Adresi:</label>
                <input type="email" name="email" required placeholder="örnek@marmara.edu.tr">
            </div>
            <div class="form-group">
                <label>Şifre:</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">Giriş Yap</button>
        </form>
    </div>
</body>
</html>
