<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamFlow - Giriş Yap</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- İkon için FontAwesome ekliyoruz -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-card">
        <!-- Logo Alanı -->
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>ExamFlow</h1>
            <p>Online Sınav Yönetim Sistemi</p>
        </div>

        <!-- Flash Mesajları -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Form Alanı -->
        <form action="/" method="post">
            <div class="input-group">
                <label>E-posta adresi</label>
                <input type="email" name="email" placeholder="ornek@uni.edu.tr" required>
            </div>
            <div class="input-group">
                <label>Şifre</label>
                <input type="password" name="password" placeholder="**********" required>
            </div>
            <button type="submit" class="btn-primary">Giriş Yap</button>
        </form>

        <div class="divider">
            <span>veya</span>
        </div>

        <a href="{{ url_for('register') }}" class="btn-secondary">Yeni hesap oluştur</a>

        <div class="scroll-down">
            <i class="fas fa-arrow-down"></i>
        </div>
    </div>
</body>
</html>
