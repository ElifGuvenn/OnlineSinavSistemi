<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamFlow | Yeni Sınav Oluştur</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-creme: #f7f5ee;
            --purple-main: #5e5adb;
            --text-dark: #333;
            --input-bg: #f4f4ee;
        }

        body { background-color: var(--bg-creme); margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        .navbar { background-color: #1a1c33; padding: 15px 50px; color: white; display: flex; justify-content: space-between; align-items: center; }
        
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        .page-title h2 { margin: 0; color: var(--text-dark); font-size: 28px; }
        .page-title p { color: #666; margin-bottom: 30px; }

        .card { background: white; border-radius: 15px; padding: 30px; border: 1px solid #e0e0e0; margin-bottom: 40px; }
        
        .section-title { font-weight: 600; font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        .form-group label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #444; }
        
        .form-control { 
            background-color: var(--input-bg); 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            padding: 12px; 
            font-size: 15px;
            outline: none;
        }

        .btn-outline {
            background: white; border: 1px solid #ccc; padding: 12px; border-radius: 10px; cursor: pointer;
            width: 100%; font-weight: 600; font-size: 15px; transition: 0.3s;
        }
        .btn-outline:hover { background: #f0f0f0; }

        /* Soru Kartları Özel Stili */
        .question-card {
            background: #fdfdfb; border: 1px solid #ddd; border-radius: 15px; padding: 25px;
            position: relative; margin-top: 45px; margin-bottom: 20px;
        }
        
        .question-badge {
            position: absolute; top: -15px; left: 25px;
            background-color: var(--purple-main); color: white;
            padding: 5px 20px; border-radius: 20px; font-weight: bold; font-size: 14px;
        }

        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }

        .btn-submit {
            background-color: var(--purple-main); color: white; border: none;
            width: 100%; padding: 18px; border-radius: 12px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin-top: 30px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <span style="font-weight: bold; font-size: 20px;">ExamFlow</span>
        <a href="/teacher" style="color: white; text-decoration: none; font-size: 14px;"><i class="fas fa-arrow-left"></i> Panele Dön</a>
    </nav>

    <div class="container">
        <div class="page-title">
            <h2>Yeni Sınav Oluştur</h2>
            <p>Sınav bilgilerini girin, ardından soru formlarını hazırlayın</p>
        </div>

        <form action="/create_exam" method="post">
            <!-- GENEL BİLGİLER KARTI -->
            <div class="card">
                <div class="section-title">Genel Bilgiler</div>
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label>Sınav Başlığı</label>
                        <input type="text" name="title" class="form-control" placeholder="Algoritma Analizi Vize" required>
                    </div>
                    <div class="form-group">
                        <label>Süre (Dakika)</label>
                        <input type="number" name="duration" class="form-control" placeholder="45" required>
                    </div>
                    <div class="form-group">
                        <label>Soru Sayısı</label>
                        <input type="number" name="question_count" id="questionCount" class="form-control" placeholder="20" required>
                    </div>
                </div>
                <button type="button" class="btn-outline" onclick="generateFields()">Soru Formlarını Hazırla <i class="fas fa-arrow-down"></i></button>
            </div>

            <!-- DİNAMİK SORULAR ALANI -->
            <div id="questionsContainer"></div>

            <button type="submit" id="submitBtn" class="btn-submit" style="display: none;">Sınavı Kaydet ve Yayınla</button>
        </form>
    </div>

    <script>
        function generateFields() {
            const count = document.getElementById('questionCount').value;
            const container = document.getElementById('questionsContainer');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!count || count < 1) { alert("Lütfen soru sayısı giriniz!"); return; }

            container.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                container.innerHTML += `
                <div class="question-card">
                    <div class="question-badge">Soru ${i}</div>
                    <div class="form-group">
                        <label>Soru Metni</label>
                        <textarea name="q_text_${i}" class="form-control" rows="2" required></textarea>
                    </div>
                    <div class="choice-grid">
                        <div class="form-group"><label>A Şıkkı</label><input type="text" name="q_opt_a_${i}" class="form-control" required></div>
                        <div class="form-group"><label>B Şıkkı</label><input type="text" name="q_opt_b_${i}" class="form-control" required></div>
                        <div class="form-group"><label>C Şıkkı</label><input type="text" name="q_opt_c_${i}" class="form-control" required></div>
                        <div class="form-group"><label>D Şıkkı</label><input type="text" name="q_opt_d_${i}" class="form-control" required></div>
                    </div>
                    <div class="form-group" style="margin-top: 15px; width: 200px;">
                        <label>Doğru Cevap:</label>
                        <select name="q_correct_${i}" class="form-control" required>
                            <option value="">Seçiniz...</option>
                            <option value="A">A Şıkkı</option>
                            <option value="B">B Şıkkı</option>
                            <option value="C">C Şıkkı</option>
                            <option value="D">D Şıkkı</option>
                        </select>
                    </div>
                </div>`;
            }
            submitBtn.style.display = 'block';
            window.scrollTo({ top: container.offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
